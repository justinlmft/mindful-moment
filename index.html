<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindful Moment — Session Builder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500;600;700&display=swap');
  :root{
    --bone:#FAF9F5; --ink:#1a1f2a; --line:#e4e1d8; --card:#ffffff;
    --muted:#8a877e; --soft:#f1efe8; --draft:#b9842f; --notes:#6b685f;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:var(--bone);color:var(--ink);line-height:1.5;height:100vh;overflow:hidden;display:flex;flex-direction:column}
  header{padding:18px 26px;border-bottom:1px solid var(--line);flex:0 0 auto}
  header h1{margin:0;font-size:19px;letter-spacing:.2px;font-weight:700}
  header p{margin:4px 0 0;color:var(--muted);font-size:13px}
  .wrap{display:flex;flex:1;min-height:0}
  .panel{padding:22px 26px}
  .dials{width:350px;flex:0 0 350px;overflow-y:auto;display:flex;flex-direction:column}
  #splitter{flex:0 0 7px;cursor:col-resize;border-left:1px solid var(--line);transition:background .12s}
  #splitter:hover,#splitter.dragging{background:var(--line)}
  .out{flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column}
  .out .tabs{flex:0 0 auto}
  #slidesWrap{flex:1;min-height:0;overflow-y:auto;padding-top:2px}
  .dial{margin-bottom:24px}
  .dial.sep{border-top:2px solid var(--line);padding-top:22px;margin-top:2px}
  .dial label.h{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:var(--ink);margin-bottom:10px;font-weight:700}
  .sub{font-size:12px;color:var(--muted);margin:-4px 0 10px}
  .opts{display:flex;flex-wrap:wrap;gap:6px}
  .opt{border:1px solid var(--line);background:var(--card);color:var(--ink);
    padding:7px 11px;border-radius:8px;cursor:pointer;font-size:13px;transition:.12s;display:flex;align-items:center;gap:7px}
  .opt:hover{border-color:var(--ink)}
  .opt.sel{background:var(--ink);border-color:var(--ink);color:var(--bone);font-weight:600}
  .opt .ord{width:18px;height:18px;border-radius:50%;background:var(--bone);color:var(--ink);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
  .toggle{display:flex;align-items:center;gap:9px;font-size:13px;cursor:pointer;margin-top:8px}
  .toggle input{width:15px;height:15px;accent-color:var(--ink)}
  .numrow{display:flex;align-items:center;gap:9px;font-size:13px}
  .numrow input{width:64px;padding:6px 8px;border:1px solid var(--line);border-radius:7px;font-family:inherit;font-size:13px}
  .randbar{margin-top:auto;padding-top:16px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
  .tabs{display:flex;gap:6px;margin:0 0 14px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
  .tab{padding:8px 16px;border:1px solid var(--line);border-bottom:none;background:var(--soft);color:var(--muted);
    border-radius:9px 9px 0 0;cursor:pointer;font-size:13px;transition:.12s;position:relative;top:1px}
  .tab:hover{color:var(--ink)}
  .tab.sel{background:var(--bone);color:var(--ink);border-bottom:1px solid var(--bone);font-weight:600}
  .name{font-size:17px;font-weight:700;margin:0 0 4px}
  .flow{display:flex;gap:8px;align-items:center;margin:2px 0 16px;flex-wrap:wrap}
  .flow .step{display:flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--card);
    border-radius:999px;padding:4px 12px 4px 5px;font-size:12.5px;font-weight:600}
  .flow .num{width:20px;height:20px;border-radius:50%;background:var(--ink);color:var(--bone);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
  .flow .arr{color:var(--muted);font-size:14px}
  .bar{display:flex;gap:9px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
  .btn{padding:8px 14px;border:1px solid var(--ink);background:var(--ink);color:var(--bone);
    border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit}
  .btn:hover{opacity:.85}
  .btn.ghost{background:transparent;color:var(--ink)}
  .count{font-size:12px;color:var(--muted)}
  .slide{border:1px solid var(--line);border-radius:10px;padding:13px 16px;margin-bottom:10px;background:var(--card)}
  .slide.fixedc{border-style:dashed;background:transparent}
  .slide .tag{font-size:10px;text-transform:uppercase;letter-spacing:1.1px;margin-bottom:5px;color:var(--muted)}
  .slide .stu{font-size:16px;margin:2px 0 0;font-weight:600}
  .slide .bod{font-size:13px;color:var(--ink);opacity:.75;margin:5px 0 0;line-height:1.6}
  .slide .note{font-size:12.5px;color:var(--notes);margin:8px 0 0;padding-left:10px;border-left:2px solid var(--line);line-height:1.6}
  .slide .note b{font-weight:600;text-transform:uppercase;letter-spacing:.8px;font-size:10px;color:var(--muted)}

  /* ---------- PRESENTER CONSOLE ---------- */
  #console{position:fixed;inset:0;background:var(--bone);display:none;flex-direction:column;z-index:50}
  #console.on{display:flex}
  .cTop{display:flex;justify-content:space-between;align-items:center;padding:14px 26px;border-bottom:1px solid var(--line)}
  .cTop .cnt{font-size:14px;color:var(--muted)}
  .cMain{flex:1;display:flex;min-height:0}
  .cPrev{flex:0 0 46%;padding:22px;display:flex;flex-direction:column;gap:12px;border-right:1px solid var(--line)}
  .pvLabel{font-size:10px;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);font-weight:600}
  .pvBox{border:1px solid var(--line);background:#fff;overflow:hidden;position:relative;width:100%;aspect-ratio:16/9;border-radius:6px}
  .cNext{font-size:14px;color:var(--muted)}
  .cNext b{color:var(--ink);font-weight:600}
  .cNotes{flex:1;padding:26px;overflow-y:auto}
  .cNotes .nh{font-size:10px;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);font-weight:600;margin-bottom:12px}
  .cNotes .nt{font-size:19px;line-height:1.6;color:var(--ink);max-width:640px}
  .cNotes .nt p{margin:0 0 12px}
  .cNotes .nt ul{margin:0 0 14px;padding-left:24px}
  .cNotes .nt li{margin:5px 0}
  .cNotes .nt:empty::before{content:"— (lots of quiet) —";color:var(--muted)}
  .cBot{display:flex;justify-content:space-between;align-items:center;padding:14px 26px;border-top:1px solid var(--line)}
  .cBot button{background:var(--ink);border:1px solid var(--ink);color:var(--bone);border-radius:8px;padding:9px 18px;cursor:pointer;font-size:14px;margin-left:8px;font-family:inherit}
  .cBot button.ghost{background:transparent;color:var(--ink)}
  .shareTip{font-size:12px;color:var(--muted)}

  @media print{
    .dials,.bar,header p,.tabs,#console{display:none}
    body{background:#fff;color:#000;height:auto;overflow:visible;display:block}
    .slide{border-color:#bbb;background:#fff;color:#000}
    .wrap{display:block}
    .out{overflow:visible;display:block}
    #slidesWrap{overflow:visible}
  }
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:14px">
    <img src="https://static.wixstatic.com/media/2d354d_b31143f17d0b49b08b0f3df8b49c78f3~mv2.png" alt="Unstucking Academy" style="height:34px;width:auto;display:block">
    <h1>Mindful Moment — Session Builder</h1>
  </div>
</header>

<div class="wrap">
  <div class="panel dials">
    <div class="dial">
      <label class="h">Senses — click to add in order</label>
      <p class="sub">Tap to add (numbered in spoken order) · tap again to remove.</p>
      <div class="opts" id="senseOpts"></div>
    </div>

    <div class="dial sep">
      <label class="h">Shape</label>
      <label class="toggle"><input type="checkbox" id="tBreath" onchange="st.breathEach=this.checked;render()" checked> Breath reset before each sense</label>
      <label class="toggle"><input type="checkbox" id="tAck" onchange="st.acknowledge=this.checked;render()" checked> Acknowledge slide (open)</label>
      <label class="toggle"><input type="checkbox" id="tMove" onchange="st.closeMove=this.checked;render()" checked> Move slide (close)</label>
      <label class="toggle"><input type="checkbox" id="tKind" onchange="st.kindness=this.checked;render()" checked> Kindness slide (close)</label>
<label class="toggle" style="margin-top:14px;padding-top:12px;border-top:1px solid var(--line)"><input type="checkbox" id="tTest" onchange="st.testMode=this.checked;render()"> 🧪 Test session <span style="color:var(--muted)">— the app popup says to ignore it</span></label>
    </div>

    <div class="dial sep">
      <label class="h">Practice scene</label>
      <p class="sub">The living backdrop from the app, behind the practice words. Subtle, and it honors Reduce Motion.</p>
      <div class="opts" id="sceneOpts"></div>
      <p class="sub" id="sceneCap" style="margin:10px 0 0"></p>
    </div>

    <div class="randbar">
      <button class="btn" style="width:100%" onclick="randomize()">🎲 Randomize senses & order</button>
      <button class="btn ghost" style="width:100%" onclick="clearSenses()">Clear senses</button>
    </div>
  </div>

  <div id="splitter"></div>

  <div class="panel out">
    <p class="name" id="sName"></p>
    <div class="flow" id="sAgenda"></div>
    <div class="bar">
      <button class="btn" onclick="startPresent()">▶ Present</button>
      <button class="btn ghost" onclick="window.print()">Print / Save PDF</button>
      <span class="count" id="slideCount"></span>
    </div>
    <div class="tabs" id="tabs"></div>
    <div id="slidesWrap"><div id="slidesView"></div></div>
  </div>
</div>

<!-- Presenter console -->
<div id="console">
  <div class="cTop"><span class="cnt" id="pCount"></span><span class="pJoin" id="pJoin" style="font-size:13px;color:var(--muted)"></span></div>
  <div class="cMain">
    <div class="cPrev">
      <span class="pvLabel">Current slide</span>
      <div class="pvBox" id="pvBox"></div>
      <div class="cNext" id="cNext"></div>
    </div>
    <div class="cNotes">
      <div class="nh">Presenter notes</div>
      <div class="nt" id="cNotes"></div>
    </div>
  </div>
  <div class="cBot">
    <span class="shareTip">← → arrows · space = next · Esc = end</span>
    <span>
      <button class="ghost" onclick="pPrev(event)">← Prev</button>
      <button onclick="pNext(event)">Next →</button>
      <button class="ghost" onclick="endPresent()">End session</button>
    </span>
  </div>
</div>

<script>//---------------------------------------------------------------------
//
// QR Code Generator for JavaScript
//
// Copyright (c) 2009 Kazuhiko Arase
//
// URL: http://www.d-project.com/
//
// Licensed under the MIT license:
//  http://www.opensource.org/licenses/mit-license.php
//
// The word 'QR Code' is registered trademark of
// DENSO WAVE INCORPORATED
//  http://www.denso-wave.com/qrcode/faqpatent-e.html
//
//---------------------------------------------------------------------

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

              0x80 | ((charcode>>6) & 0x3f),
              0x80 | (charcode & 0x3f));

      }
      return utf8;
    }
    return toUTF8Array(s);

const SENSES = {
  touch:{ word:"touch", note:
    "Now, let’s check in with touch. We’ll start with your entire body. — What is it you’re sitting, standing, laying, or leaning on? Can you feel its firmness? Or is it soft? Does it let you sink into it? — What can you feel specifically on your skin? The air? The fabric of your clothes? Something you can hold onto nearby?" },
  sight:{ word:"sight", note:
    "Now, we’ll use your eyes. Open them if they’re closed, as they’re ready to open. You don’t need to do anything special — just look where they want you to look. If your neck wants to move to help your eyes see more, let your neck and eyes work together. — Is there one thing pulling at your eyes? What’s its shape? Let your eyes trace the edges. Notice how the light from the room touches it. And the shadows it creates." },
  sound:{ word:"sound", note:
    "Now, what do you hear? Anything? Silence? — Inside the room… what do you hear? — Outside the room… what do you hear?" },
  movement:{ word:"movement", note:
    "Let’s add some gentle, on-purpose movement. Small and easy — you’re not performing. — Roll your ankles, slow, both directions. Roll your wrists, let your hands soften. Roll your shoulders — up, back, and down — let them drop. Stretch into whatever wants to lengthen. — Then pause. Notice what lingers. The sensation doesn’t stop the moment you do." },
  imagination:{ word:"imagination", note:
    "Let’s use your imagination. Bring to mind a place where you feel at ease — real or imagined, a memory or made up. Let it take shape. Indoors or out? Day or night? Where are you in it? — Look around: what do you see? What do you hear there, or is it quiet? What do you feel there — the air, the temperature, the ground beneath you?" }
};

const BREATH_NOTE = "Check in with the natural ins and outs of your breath. How is your body naturally breathing right now? Don’t change it, just notice it. If it changes by itself because you paid attention, that’s fine. — Chest or belly? Full or shallow? Tense or relaxed?";

/* ---------- STATE ---------- */
let st = {
  order:["sound","touch","sight"],   // selected senses, in spoken order
  breathEach:true,
  acknowledge:true,
  closeMove:true,
  kindness:true,
  testMode:false,  // ON = the app popup tells members to ignore this session

/* ---------- BEAT MODEL ----------

function cover(h,note,eyebrow,logo){ return {style:"cover",h,note:note||"",eyebrow:eyebrow||"",flow:"",logo:logo!==false,fixed:true}; }
function word(h,note,fixed){ return {style:"word",h,note:note||"",eyebrow:"",flow:"",logo:false,fixed:!!fixed}; }
function checkinBeat(phase){ return {style:"checkin", phase:phase, h:(phase==="before"?"a quick check-in.":"one more check-in."), body:(phase==="before"?BEFORE_BODY:AFTER_BODY), note:(phase==="before"?BEFORE_NOTE:AFTER_NOTE), eyebrow:"", flow:"", logo:true, fixed:true}; }

function eventsBeat(){

}

const TABS={intro:"Intro",practice:"Practice",closing:"Outro"};
function buildBeats(){
  let B=[];
  const sec=(name,from)=>{for(let i=from;i<B.length;i++)B[i].section=name;};

  /* INTRO (fixed arc) */
  const welcome=cover("welcome.",
    "Welcome! The whole idea here is super simple. For the next 20ish minutes, we’re just creating a space to connect with the present moment. — Whether you’re here intentionally or doing something else… let my voice point your thoughts to the present moment. If your mind wanders, that’s okay — come back when prompted. Pause when needed. — Today we’ll move through: "+(st.order.length?st.order.map(cap).join(", "):"a few senses")+".");
  welcome.flow=flowHTML();
  B.push(welcome);
  B.push(cover("the start of a<br>mindfulness practice.",
    "Of course, this is not therapy. This is not coaching or personal life advice. However, these very simple mindfulness prompts are what I use when I work with people to help them develop a connection to the present moment, cultivate a mindfulness practice, and even reduce experiences like anxiety. — These prompts are the beginning of a much deeper mindfulness practice."));
  B.push(cover("participation?",
    "There’s no pressure to participate. All you need to worry about is the present moment. — If you’d like to be more active and share an experience in the chat, go right ahead. Keep it very present-moment focused, following what we’re doing here."));
  B.push(cover("no pressure.<br>just presence.",
    "The motto for this is: no pressure, just presence. From here on, I’ll give a simple prompt and a few follow-ups. But mostly, lots of quiet. That’s really it. Sound good? Let’s begin."));
  if(st.acknowledge){
    B.push(word("acknowledge",
      "As we begin, acknowledge what else you might be holding onto — a current or past context. Not going into details. Just acknowledge what else you have, and give yourself permission to also practice mindfulness. — These Mindful Moments aren’t dismissive of what else you have, and aren’t rejecting it. They create space to acknowledge it, and eventually pave the way for those other feelings when you’re ready — the deeper work of the Unstucking Academy. For now, we acknowledge, and give ourselves permission to also be more present."));
  }
  sec("intro",0);

  /* PRACTICE (varies) */
  let m=B.length;
  B.push(checkinBeat("before"));
  st.order.forEach(k=>{
    if(st.breathEach) B.push(word("breath",BREATH_NOTE));
    const s=SENSES[k];
    if(s) B.push(word(s.word,s.note));
  });
  if(st.breathEach && st.order.length) B.push(word("breath",BREATH_NOTE));
  sec("practice",m);

  /* OUTRO (fixed arc) */
  m=B.length;
  if(st.closeMove){
    B.push(word("move",
      "We’ll end this mindfulness practice the way we always do, inside the Unstucking Academy. Let your body move in whatever way it would like to. There’s no wrong way. No prescriptive movement. — Push, pull, squeeze, wiggle, jump, squat, stand, stretch, lie down, shimmy, or shake… Turn your camera off if you’d like, if you need to do something silly."));
  }
  if(st.kindness){
    B.push(word("kindness","Offer yourself a little kindness. You’ve earned it. Even a ‘good job, self’ counts."));
  }
  B.push(checkinBeat("after"));
  B.push(cover("woo-hoo! 🎉",
    "You did it. You practiced mindfulness. You survived. — Good job to you if this was a return to simple mindfulness. Good job to you if this was your first time. Good job to you if this was a continuation of your practices."));
  B.push(cover("thank you.",
    "Thank you for being a part of this Mindful Moment. Thank you for taking the time to join. I hope you got a little bit of what you needed. — If you don’t mind, share in the chat what this was like for you. Maybe just a word if you’ve got one. Share more if you’ve got more. — Tell someone in the chat that you appreciate them sharing, or that you can relate, or just leave a thumbs up on their comment. — I hope we can meet again and continue to practice."));
  B.push(eventsBeat());
  sec("closing",m);

  return B;
}

const STUDENT_PAGE_CSS = `html,body{margin:0;height:100%;overflow:hidden;background:#FAF9F5}`;

/* ---------- LIVE EVENT DATA (shared site-data.json, same system as the website) ----------
   Fills any [data-snb="dotted.path"] from the live file; baked text is the fallback. */
const SNB_SRC="https://raw.githubusercontent.com/justinlmft/stucknotbroken/main/site-data.json";
let SNB_DATA=null;
function snbGet(o,p){ return p.split('.').reduce((a,k)=>(a&&a[k]!=null)?a[k]:undefined,o); }
function applySNB(root){
  if(!SNB_DATA||!root) return;
  root.querySelectorAll('[data-snb]').forEach(n=>{
    const v=snbGet(SNB_DATA,n.getAttribute('data-snb'));
    if(typeof v==='string'||typeof v==='number') n.textContent=v;
  });
}
function fetchSNB(){
  try{
    const c=('AbortController' in window)?new AbortController():null;
    const t=c?setTimeout(()=>c.abort(),6000):null;
    fetch(SNB_SRC,c?{signal:c.signal,cache:'no-store'}:{cache:'no-store'})
      .then(r=>r.ok?r.json():Promise.reject(r.status))
      .then(d=>{ if(t)clearTimeout(t); SNB_DATA=d; applySNB(document); })
      .catch(()=>{ /* keep baked fallbacks */ });
  }catch(e){ /* keep baked fallbacks */ }
}

/* ---------- CONTROLS ---------- */
function senseChips(){
  const el=document.getElementById("senseOpts"); el.innerHTML="";
  Object.keys(SENSES).forEach(k=>{
    const idx=st.order.indexOf(k), on=idx>=0;
    const d=document.createElement("div");
    d.className="opt"+(on?" sel":"");
    d.innerHTML=(on?'<span class="ord">'+(idx+1)+'</span>':"")+cap(k);
    d.onclick=()=>{ toggleSense(k); };
    el.appendChild(d);
  });
}
function toggleSense(k){
  const i=st.order.indexOf(k);
  if(i>=0) st.order.splice(i,1); else st.order.push(k);
  render();
}
function clearSenses(){ st.order=[]; render(); }

/* ---------- RANDOMIZE ---------- */
function randomize(){
  const keys=Object.keys(SENSES);
  for(let i=keys.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [keys[i],keys[j]]=[keys[j],keys[i]]; }
  const n=3+Math.floor(Math.random()*2); // 3 or 4 senses
  st.order=keys.slice(0,n);
  render();
}

/* ---------- BUILDER VIEW ---------- */
let curTab="practice";
function slidesHTML(beats){
  let html="";
  beats.forEach(b=>{
    const cls="slide "+(b.fixed?"fixedc":"");
    const tag=(b.fixed?"Fixed arc":"Varies with dials")+" · "+b.style;
    const head=b.h.replace(/<br>/g," ");
    html+='<div class="'+cls+'"><div class="tag">'+tag+'</div>'+
      '<p class="stu">'+head+(b.eyebrow?' <span style="color:var(--muted);font-weight:400;font-size:12px">· '+b.eyebrow.replace(/<br>/g," ")+'</span>':"")+'</p>'+
      (b.note?'<p class="note"><b>presenter notes</b> &nbsp;'+b.note+'</p>':'<p class="note" style="color:var(--muted)">— (lots of quiet) —</p>')+
      '</div>';
  });
  return html;
}
function render(){
  // sync simple controls
  document.getElementById("tBreath").checked=st.breathEach;
  document.getElementById("tAck").checked=st.acknowledge;
  document.getElementById("tMove").checked=st.closeMove;
  document.getElementById("tKind").checked=st.kindness;
  { const _t=document.getElementById("tTest"); if(_t) _t.checked=st.testMode; }
  senseChips();
  sceneChips();

  document.getElementById("sName").textContent=sessionName();
  const agenda = (st.order.length?st.order.map(cap):["—"]);
  document.getElementById("sAgenda").innerHTML=
    agenda.map((n,i)=>'<span class="step"><span class="num">'+(i+1)+'</span>'+n+'</span>')
    .join('<span class="arr">→</span>');

  const beats=buildBeats();
  document.getElementById("slideCount").textContent=beats.length+" slides total";
  const tabsEl=document.getElementById("tabs"); tabsEl.innerHTML="";
  Object.keys(TABS).forEach(k=>{
    const d=document.createElement("div");
    d.className="tab"+(curTab===k?" sel":"");
    d.innerHTML=TABS[k];
    d.onclick=()=>{ curTab=k; render(); };
    tabsEl.appendChild(d);
  });
  document.getElementById("slidesView").innerHTML=slidesHTML(beats.filter(b=>b.section===curTab));
  applySNB(document.getElementById("slidesView"));
}
window.addEventListener("beforeprint",()=>{ if(!IS_STUDENT) document.getElementById("slidesView").innerHTML=slidesHTML(buildBeats()); });
window.addEventListener("afterprint",()=>{ if(!IS_STUDENT) render(); });

/* ============================================================
   LIVE SCENES — ported from the SNB app player (player.html).
   Same seven scenes, same felt behaviour: no cycle a nervous
   system can lock onto. Simplified for the presenter — one calm
   colour, ink on bone; the two light scenes (sunbeam/fireflies)
   run gold/bone on a dark field, exactly as in the app. Shown
   only behind the practice word slides. Reduced-motion holds still.
   ============================================================ */
const MM_SCENES=['circles','drift','pond','reeds','breeze','sunbeam','fireflies'];
const MM_DARK={sunbeam:1,fireflies:1};   // light phenomena need a dark field (as in the app)
const SCENE_CAP={
  '':'a different scene each session, chosen at random when you present.',
  circles:'a slow breathing circle, the app’s pacer.',
  drift:'soft specks drifting upward, each at its own pace.',
  pond:'still water, a ripple now and then.',
  reeds:'reeds swaying in an uneven breeze.',
  breeze:'strands carried sideways on a light wind, each at its own speed.',
  sunbeam:'a still beam of light, dust hanging in it. dims the slide.',
  fireflies:'small lights arriving and leaving on their own time. dims the slide.'
};
function sceneChips(){
  const el=document.getElementById('sceneOpts'); if(!el) return; el.innerHTML='';
  const opts=[['','surprise me']].concat(MM_SCENES.map(s=>[s,s]));
  opts.forEach(([val,label])=>{
    const d=document.createElement('div');
    d.className='opt'+(st.scene===val?' sel':'');
    d.textContent=label;
    d.onclick=()=>{ st.scene=val; sceneChips(); };
    el.appendChild(d);
  });
  const c=document.getElementById('sceneCap'); if(c)c.textContent=SCENE_CAP[st.scene]||'';
}

/* one engine per canvas (the student window + the presenter preview each get one) */
function makeSceneEngine(canvas){
  const g=canvas.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let scene='circles', active=false, vis=0;
  let motes=[],reeds=[],rips=[],strands=[],dust=[],flies=[],ripNext=0,sT=0,sLast=0,raf=null,seeded=false;
  const INK=[26,31,42], BONE=[250,249,245];
  function fit(){ const dpr=devicePixelRatio||1, w=canvas.clientWidth||1, h=canvas.clientHeight||1;
    canvas.width=Math.round(w*dpr); canvas.height=Math.round(h*dpr); g.setTransform(dpr,0,0,dpr,0,0); }
  function seed(){
    motes=[];reeds=[];rips=[];strands=[];dust=[];flies=[];ripNext=0;sT=0;sLast=0;
    for(let i=0;i<9;i++)motes.push({x:Math.random(),y:Math.random(),r:1.5+Math.random()*3.5,v:(3.5+Math.random()*8)/1000,dx:(Math.random()-.5)*.003,a:.18+Math.random()*.3});
    for(let i=0;i<7;i++)reeds.push({x:.12+.76*(i/6)+(Math.random()-.5)*.05,h:.3+Math.random()*.34,per:8+Math.random()*8,ph:Math.random()*6.283,amp:.04+Math.random()*.04,w:1.4+Math.random()*1.2});
    for(let i=0;i<7;i++)strands.push({y:.15+.7*(i/6)+(Math.random()-.5)*.06,len:.2+Math.random()*.22,sp:(28+Math.random()*46)/1000,x:Math.random()*1.4-.2,amp:2.5+Math.random()*4,ph:Math.random()*6.283,a:.22+Math.random()*.28});
    for(let i=0;i<8;i++)dust.push({x:.36+Math.random()*.24,y:.12+Math.random()*.72,r:1+Math.random()*1.6,per:9+Math.random()*11,ph:Math.random()*6.283,ax:4+Math.random()*6,ay:8+Math.random()*9,a:.35+Math.random()*.25});
    for(let i=0;i<7;i++)flies.push({x:.12+.76*(i/6)+(Math.random()-.5)*.09,y:.15+Math.random()*.62,per:5.5+Math.random()*6.5,ph:Math.random()*10,wx:8+Math.random()*9,wy:6+Math.random()*8});
    seeded=true;
  }
  function set(sc){ if(sc && sc!==scene){ scene=sc; seed(); } }
  function show(on){ active=!!on; }
  function draw(){
    const W=canvas.clientWidth,H=canvas.clientHeight; g.clearRect(0,0,W,H);
    vis += ((active?1:0)-vis)*0.08; if(vis<0.01) return;
    if(!seeded) seed();
    const t=performance.now()/1000, dt=Math.min(.05,Math.max(0,t-sLast)); sLast=t; if(!reduce) sT+=dt;
    const unit=Math.min(Math.min(W,H),430), dark=!!MM_DARK[scene], base=dark?BONE:INK, fade=vis;
    const col=a=>'rgba('+base[0]+','+base[1]+','+base[2]+','+(a*fade)+')';
    if(scene==='drift'){
      motes.forEach(m=>{ if(!reduce){ m.y-=m.v*dt*3; m.x+=m.dx*dt*3; if(m.y<-.05){ m.y=1.05; m.x=Math.random(); } }
        g.strokeStyle=col(m.a); g.lineWidth=1.3; g.beginPath();g.arc(m.x*W,m.y*H,m.r*(unit/300+.6),0,6.283);g.stroke(); });
    } else if(scene==='pond'){
      if(!reduce&&sT>=ripNext){ rips.push({x:.2+Math.random()*.6,y:.25+Math.random()*.5,b:sT}); ripNext=sT+4+Math.random()*5; if(rips.length>4)rips.shift(); }
      rips.forEach(rp=>{ const age=sT-rp.b, life=6; if(age>life) return; const p=age/life, R=unit*(.06+.42*p),
        aOut=(p<.08?p/.08:Math.max(0,1-((p-.08)/.57)))*.5, aIn=(p<.08?p/.08:1-((p-.08)/.92))*.5;
        g.lineWidth=1.5; g.strokeStyle=col(aOut); g.beginPath();g.arc(rp.x*W,rp.y*H,R,0,6.283);g.stroke();
        g.strokeStyle=col(aIn); g.beginPath();g.arc(rp.x*W,rp.y*H,R*.62,0,6.283);g.stroke(); });
    } else if(scene==='reeds'){
      reeds.forEach(rd=>{ const sw=Math.sin(sT*6.283/rd.per+rd.ph)*rd.amp, bx=rd.x*W, by=H, hh=rd.h*H, tx=bx+sw*hh, ty=by-hh;
        g.strokeStyle=col(.5); g.lineWidth=rd.w; g.lineCap='round';
        g.beginPath(); g.moveTo(bx,by); g.quadraticCurveTo(bx+sw*hh*.25, by-hh*.55, tx, ty); g.stroke(); });
    } else if(scene==='breeze'){
      strands.forEach(s=>{ if(!reduce){ s.x+=s.sp*dt; if(s.x>1.15){ s.x=-.35; s.y=.15+Math.random()*.7; } }
        const y0=s.y*H, x0=s.x*W, L=s.len*W; g.strokeStyle=col(s.a); g.lineWidth=1.6; g.lineCap='round';
        g.beginPath(); g.moveTo(x0,y0); g.lineTo(x0+L,y0); g.stroke(); });
    } else if(scene==='sunbeam'){
      const AMBER=a=>'rgba(246,228,180,'+(a*fade)+')', bw=W*.34, grd=g.createLinearGradient(0,-H,0,H);
      grd.addColorStop(0,AMBER(.30)); grd.addColorStop(1,AMBER(.04));
      g.save(); g.translate(W*.5,H*.5); g.rotate(.3); g.fillStyle=grd; g.fillRect(-bw/2,-H*1.2,bw,H*2.4); g.restore();
      dust.forEach(d=>{ const px=(d.x*W)+Math.sin(sT*6.283/d.per+d.ph)*d.ax, py=(d.y*H)+Math.cos(sT*6.283/(d.per*1.3)+d.ph)*d.ay;
        g.fillStyle='rgba(26,31,42,'+(Math.min(1,.5+d.a)*fade)+')'; g.beginPath();g.arc(px,py,d.r,0,6.283);g.fill(); });
    } else if(scene==='fireflies'){
      const B2=a=>'rgba(250,249,245,'+(a*fade)+')';
      flies.forEach(f=>{ const p=((sT+f.ph)%f.per)/f.per, tw=Math.sin(p*Math.PI),
        px=(f.x*W)+Math.sin(sT*6.283/(f.per*2.1)+f.ph)*f.wx, py=(f.y*H)+Math.cos(sT*6.283/(f.per*1.7)+f.ph)*f.wy;
        g.fillStyle=B2(.12*tw); g.beginPath();g.arc(px,py,7,0,6.283);g.fill();
        g.fillStyle=B2(.3*tw);  g.beginPath();g.arc(px,py,4,0,6.283);g.fill();
        g.fillStyle=B2(.85*tw); g.beginPath();g.arc(px,py,2.2,0,6.283);g.fill(); });
    } else { /* circles — a single slow breathing ring, the app’s pacer */
      const cx=W/2, cy=H/2, breath=reduce?0.5:(Math.sin(sT*0.55)*0.5+0.5), dotR=Math.max(2.5,unit*0.02), breathR=unit*(0.20+0.12*breath);
      g.lineCap='round'; g.strokeStyle=col(0.9); g.lineWidth=2.5; g.beginPath();g.arc(cx,cy,breathR,0,6.283);g.stroke();
      g.fillStyle=col(0.82); g.beginPath();g.arc(cx,cy,dotR,0,6.283);g.fill();
    }
  }
  function loop(){ raf=requestAnimationFrame(loop);
    const d=devicePixelRatio||1;
    if(Math.round(canvas.clientWidth*d)!==canvas.width||Math.round(canvas.clientHeight*d)!==canvas.height) fit();
    draw();
  }
  function start(){ if(!raf){ fit(); loop(); } }
  function stop(){ if(raf){ cancelAnimationFrame(raf); raf=null; } }
  addEventListener('resize',fit);
  return {set,show,start,stop,fit};
}

/* per-session scene assignment (stable across prev/next) */
let sceneMap=[], _sessionScene='circles';
function buildSceneMap(){
  _sessionScene=MM_SCENES[Math.floor(Math.random()*MM_SCENES.length)];
  let wc=0;
  sceneMap=pSlides.map(b=>{
    if(b.style!=='word') return null;
    let s;
    if(st.scene) s=st.scene;
    else s=_sessionScene;
    return s;
  });
}
function sceneMeta(i){ const b=pSlides[i], sc=sceneMap[i]; return {word:!!(b&&b.style==='word'), scene:sc||'circles', dark:!!(sc&&MM_DARK[sc])}; }

/* paint one slide into a frame: set the scene, dim if needed, gently swap the words */
function paintSlide(mmframeEl, boxEl, engine, html, meta){
  meta=meta||{};
  if(engine){ if(meta.word){ engine.set(meta.scene||'circles'); engine.show(true); } else { engine.show(false); } }
  if(mmframeEl) mmframeEl.classList.toggle('dark', !!(meta.word && meta.dark));
  if(matchMedia('(prefers-reduced-motion: reduce)').matches){ boxEl.innerHTML=html; applySNB(boxEl); return; }
  const OUT=240, IN=440;
  /* only the PRIMARY pieces animate in (headline, sense pills, the practice word,
     the check-in body, the events list). The logo/footer and eyebrow stay put. */
  const PRIMARY='h1, .mmflow, .ww, .cibody, .evlist, .evnote';
  boxEl.querySelectorAll(PRIMARY).forEach(n=>{ n.style.transition='opacity '+OUT+'ms cubic-bezier(.4,0,.2,1),transform '+OUT+'ms cubic-bezier(.4,0,.2,1)'; n.style.opacity='0'; n.style.transform='translateY(-6px)'; });
  
  setTimeout(()=>{
    boxEl.innerHTML=html; applySNB(boxEl);
    const _pn=boxEl.querySelectorAll(PRIMARY);
    _pn.forEach(n=>{ n.style.transition='none'; n.style.opacity='0'; n.style.transform='translateY(9px)'; });
    requestAnimationFrame(()=>{
      _pn.forEach(n=>{ n.style.transition='opacity '+IN+'ms cubic-bezier(.22,1,.36,1),transform '+IN+'ms cubic-bezier(.22,1,.36,1)'; n.style.opacity='1'; n.style.transform='none'; });
      
    });
  }, OUT);
}

/* ---------- PRESENT: student window + presenter console ---------- */
const IS_STUDENT = /[?&]student=1/.test(location.search);
let pSlides=[], pIdx=0, sw=null;
function studentURL(){ return location.href.split("#")[0].split("?")[0]+"?student=1"; }
function openStudentWindow(){
  sw=window.open(studentURL(),"mm_student","width=1280,height=800");
  if(!sw){ alert("Pop-up blocked — allow pop-ups for this file so the student window can open."); return false; }
  return true;
}
window.addEventListener("message",e=>{
  const d=e.data||{};
  if(IS_STUDENT){
    if(d.mmJoin!==undefined){ renderJoin(document.getElementById("mmjoin"), d.mmJoin); }
  if(d.mmSlide!==undefined){
      const box=document.getElementById("frame"), mf=document.getElementById("mmframe");
      if(box) paintSlide(mf, box, window.__mmEngine, d.mmSlide, d.mmMeta||{});
    }
    return;
  }
  if(d.mmReady) pRender();
  else if(d.mmNav===1) pNext();
  else if(d.mmNav===-1) pPrev();
});
function bootStudent(){
  document.title="Mindful Moment — Slides";
  const css=document.createElement("style"); css.textContent=STUDENT_PAGE_CSS+STUDENT_CSS;
  document.head.appendChild(css);
  document.body.innerHTML='<div class="mmframe" id="mmframe"><canvas class="mmscene" id="mmscene"></canvas><div class="mmslidebox" id="frame"></div><div class="mmjoin" id="mmjoin" style="display:none"></div></div>';
  window.__mmEngine=makeSceneEngine(document.getElementById("mmscene"));
  window.__mmEngine.start();
  document.addEventListener("keydown",e=>{
    if(!window.opener)return;
    if(e.key==="ArrowRight"||e.key===" ")window.opener.postMessage({mmNav:1},"*");
    else if(e.key==="ArrowLeft")window.opener.postMessage({mmNav:-1},"*");
  });
  if(window.opener)window.opener.postMessage({mmReady:1},"*");
  fetchSNB();
}
function fmtNote(n){
  if(!n) return "";
  let html="";
  n.split(/<br>| — /).forEach(part=>{
    part=part.trim(); if(!part) return;
    const qs=part.match(/[^?]+\?/g);
    const onlyQs=qs && qs.join("").replace(/\s/g,"")===part.replace(/\s/g,"");
    if(qs && qs.length>1 && onlyQs && qs.every(q=>q.trim().length<48)){
      html+='<ul>'+qs.map(q=>'<li>'+q.trim()+'</li>').join("")+'</ul>';
    } else {
      html+='<p>'+part+'</p>';
    }
  });
  return html;
}
function pRender(){
  if(!pSlides.length)return;
  const b=pSlides[pIdx];
  const meta=sceneMeta(pIdx), html=studentSlideHTML(b);
  if(sw && !sw.closed) sw.postMessage({mmSlide:html, mmMeta:meta},"*");
  const pvSlide=document.getElementById("pvSlide"), pvFrame=document.getElementById("pvFrame");
  if(pvSlide) paintSlide(pvFrame, pvSlide, window.__mmPreview, html, meta);
  document.getElementById("cNotes").innerHTML=fmtNote(b.note);
  const nxt=pSlides[pIdx+1];
  document.getElementById("cNext").innerHTML=nxt?("Next: <b>"+nxt.h.replace(/<br>/g," ")+"</b>"):"Next: — end of session —";
  document.getElementById("pCount").textContent=(pIdx+1)+" / "+pSlides.length;
pushJoin();
postSeamForCurrent();
}
function startPresent(){
  if(!openStudentWindow())return;
  pSlides=buildBeats();
  buildSceneMap();
  pIdx=Math.max(0,pSlides.findIndex(b=>b.section===curTab));
  document.getElementById("console").classList.add("on");
  // persistent preview structure (canvas survives slide swaps) + its own engine
  document.getElementById("pvBox").innerHTML=
    '<div class="mmframe" id="pvFrame"><canvas class="mmscene" id="pvScene"></canvas><div class="mmslidebox" id="pvSlide"></div></div>';
  if(window.__mmPreview) window.__mmPreview.stop();
  window.__mmPreview=makeSceneEngine(document.getElementById("pvScene"));
  window.__mmPreview.start();
publishLive();
  pRender();
}
function endPresent(){
  document.getElementById("console").classList.remove("on");
  if(window.__mmPreview){ window.__mmPreview.stop(); window.__mmPreview=null; }
  endLive();
  if(sw && !sw.closed) sw.close();
  sw=null;
}
function pNext(e){ if(e)e.stopPropagation(); if(pIdx<pSlides.length-1){pIdx++;pRender();} }
function pPrev(e){ if(e)e.stopPropagation(); if(pIdx>0){pIdx--;pRender();} }
document.addEventListener("keydown",e=>{
  if(IS_STUDENT)return;
  const c=document.getElementById("console");
  if(!c||!c.classList.contains("on"))return;
  if(e.key==="ArrowRight"||e.key===" ")pNext();
  else if(e.key==="ArrowLeft")pPrev();
  else if(e.key==="Escape")endPresent();
});

/* ---------- DRAGGABLE LEFT MENU ---------- */
(function(){
  const sp=document.getElementById("splitter");
  if(!sp) return;
  const dials=document.querySelector(".dials");
  let dragging=false;
  sp.addEventListener("pointerdown",e=>{
    dragging=true; sp.classList.add("dragging"); sp.setPointerCapture(e.pointerId);
    document.body.style.userSelect="none";
  });
  sp.addEventListener("pointermove",e=>{
    if(!dragging) return;
    const w=Math.max(260, Math.min(560, e.clientX - dials.getBoundingClientRect().left));
    dials.style.flex="0 0 "+w+"px"; dials.style.width=w+"px";
  });
  const stop=()=>{ dragging=false; sp.classList.remove("dragging"); document.body.style.userSelect=""; };
  sp.addEventListener("pointerup",stop); sp.addEventListener("pointercancel",stop);
})();

if(IS_STUDENT){ bootStudent(); }
else {
  const css=document.createElement("style"); css.textContent=STUDENT_CSS; // console preview
  document.head.appendChild(css);
  render();
  fetchSNB();
}
